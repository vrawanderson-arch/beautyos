version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: beautyos-postgres

    restart: always

    environment:

      POSTGRES_USER: beautyos

      POSTGRES_PASSWORD: beautyos

      POSTGRES_DB: beautyos

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data:
